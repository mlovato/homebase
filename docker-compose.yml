services:
  homebase:
    image: homebase:latest
    container_name: homebase
    restart: unless-stopped
    ports:
      - "7000:7000"
    environment:
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=changeme
      - JWT_SECRET=change-this-to-a-long-random-secret
      - DATABASE_PATH=/data/homebase.db
    volumes:
      - homebase-data:/data
      - homebase-uploads:/app/public/uploads

volumes:
  homebase-data:
  homebase-uploads:
