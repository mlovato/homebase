services:
  dashy:
    image: dashy:latest
    container_name: dashy
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - ADMIN_PASSWORD=changeme
      - JWT_SECRET=change-this-to-a-long-random-secret
      - DATABASE_PATH=/data/dashy.db
    volumes:
      - dashy-data:/data
      - dashy-uploads:/app/public/uploads

volumes:
  dashy-data:
  dashy-uploads:
